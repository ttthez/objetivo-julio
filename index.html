<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objetivo Julio · La Sinergia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  :root{
    --negro:#0d0a08;
    --negro-2:#16110d;
    --carbon:#1f1813;
    --madera:#3a2a1c;
    --fuego:#e23a16;
    --fuego-claro:#ff5a2c;
    --verde:#3fae5c;
    --crema:#f4ece1;
    --crema-tenue:#cdbfae;
    --gris:#8a7d6e;
    --linea:rgba(244,236,225,.12);
    --max:760px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--negro);
    color:var(--crema);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding:40px 20px 80px;
  }
  .wrap{max-width:var(--max);margin:0 auto}

  header{text-align:center;margin-bottom:36px}
  .kicker{
    color:var(--fuego-claro);font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;font-size:.8rem;margin-bottom:6px;
  }
  h1{font-size:2rem;font-weight:900;letter-spacing:-.5px}
  h1 b{color:var(--fuego)}
  .sub{color:var(--crema-tenue);margin-top:8px;font-size:.95rem}

  .card{
    background:var(--negro-2);
    border:1px solid var(--linea);
    border-radius:20px;
    padding:28px;
    margin-bottom:20px;
  }

  .totales{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:16px;flex-wrap:wrap;gap:8px;
  }
  .totales .actual{font-size:2.1rem;font-weight:900;color:var(--crema)}
  .totales .meta{color:var(--gris);font-size:1rem;font-weight:600}

  .barra-ext{
    width:100%;height:26px;background:var(--carbon);
    border-radius:999px;overflow:hidden;border:1px solid var(--linea);
  }
  .barra-int{
    height:100%;border-radius:999px;
    background:linear-gradient(90deg,var(--fuego),var(--fuego-claro));
    display:flex;align-items:center;justify-content:flex-end;
    transition:width .6s cubic-bezier(.4,0,.2,1);
    min-width:0;
  }
  .barra-int.completo{background:linear-gradient(90deg,#2f9950,var(--verde))}
  .barra-pct{
    font-size:.75rem;font-weight:800;color:#fff;padding-right:10px;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
  }

  .stats{display:flex;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:10px}
  .stat{flex:1;min-width:140px}
  .stat .label{color:var(--gris);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
  .stat .val{font-size:1.15rem;font-weight:800;margin-top:2px}

  .motivo{
    margin-top:18px;padding:14px 16px;border-radius:14px;
    background:rgba(226,58,22,.1);border:1px solid rgba(226,58,22,.25);
    font-weight:600;font-size:.92rem;text-align:center;
  }
  .motivo.completo{
    background:rgba(63,174,92,.12);border-color:rgba(63,174,92,.3);
  }

  .sync-row{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:14px;font-size:.78rem;
  }
  .sync-estado{color:var(--gris)}

  form{display:flex;gap:10px;flex-wrap:wrap}
  input{
    background:var(--carbon);border:1px solid var(--linea);color:var(--crema);
    border-radius:12px;padding:12px 14px;font-family:inherit;font-size:.95rem;
    flex:1;min-width:120px;
  }
  input::placeholder{color:var(--gris)}
  input:focus{outline:none;border-color:var(--fuego)}
  input[type="date"]{flex:0 0 150px;color-scheme:dark}
  input[type="number"]{flex:0 0 160px}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-weight:700;font-size:.95rem;
    padding:12px 22px;border-radius:12px;border:none;cursor:pointer;
    transition:transform .15s ease, background .2s ease;
    white-space:nowrap;
  }
  .btn-fuego{background:var(--fuego);color:#fff}
  .btn-fuego:hover{background:var(--fuego-claro);transform:translateY(-1px)}
  .btn-fuego:disabled{opacity:.6;cursor:default}

  .lista{margin-top:8px}
  .item{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 4px;border-bottom:1px solid var(--linea);gap:10px;
  }
  .item:last-child{border-bottom:none}
  .item-info{display:flex;flex-direction:column;gap:2px;min-width:0}
  .item-desc{font-weight:600;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-fecha{font-size:.78rem;color:var(--gris)}
  .item-monto{font-weight:800;color:var(--verde);white-space:nowrap;margin-left:auto}
  .item-del{
    background:none;border:none;color:var(--gris);cursor:pointer;
    font-size:1.1rem;padding:4px 8px;border-radius:8px;line-height:1;
  }
  .item-del:hover{color:var(--fuego);background:rgba(226,58,22,.1)}

  .vacio{color:var(--gris);text-align:center;padding:20px 0;font-size:.9rem}

  .footer-row{display:flex;justify-content:center;gap:14px;margin-top:6px;flex-wrap:wrap}
  .link-btn{
    background:none;border:none;color:var(--gris);font-size:.8rem;
    cursor:pointer;text-decoration:underline;font-family:inherit;
  }
  .link-btn:hover{color:var(--crema)}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="kicker">Julio 2026</div>
    <h1>Objetivo <b>$7.000.000</b></h1>
    <div class="sub">Ingresos de La Sinergia este mes</div>
  </header>

  <div class="card">
    <div class="totales">
      <div class="actual" id="totalActual">$0</div>
      <div class="meta">de $7.000.000</div>
    </div>
    <div class="barra-ext">
      <div class="barra-int" id="barraInt" style="width:0%">
        <span class="barra-pct" id="barraPct"></span>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="label">Falta</div>
        <div class="val" id="statFalta">$7.000.000</div>
      </div>
      <div class="stat">
        <div class="label">Ingresos anotados</div>
        <div class="val" id="statCant">0</div>
      </div>
    </div>
    <div class="motivo" id="motivo"></div>
    <div class="sync-row">
      <span class="sync-estado" id="estado">Cargando…</span>
      <button class="link-btn" id="btnRefrescar">Actualizar ahora</button>
    </div>
  </div>

  <div class="card">
    <form id="form">
      <input type="date" id="fecha" required>
      <input type="text" id="desc" placeholder="Descripción (ej: Catering Pérez)" required>
      <input type="number" id="monto" placeholder="Monto $" min="1" step="1" required>
      <button type="submit" class="btn btn-fuego" id="btnAnotar">Anotar</button>
    </form>
  </div>

  <div class="card">
    <div class="lista" id="lista"></div>
  </div>

  <div class="footer-row">
    <button class="link-btn" id="btnExport">Exportar backup</button>
    <button class="link-btn" id="btnImport">Importar backup</button>
    <button class="link-btn" id="btnReset">Reiniciar mes</button>
  </div>
  <input type="file" id="fileImport" accept="application/json" style="display:none">
</div>

<script>
  const META = 7000000;
  const CACHE_KEY = 'lasinergia_objetivo_julio_2026_cache';
  const KVDB_URL = 'https://kvdb.io/Fd55uogXyxYdnXJvnyN8Xo/datos';

  let items = [];

  const fmt = n => '$' + Math.round(n).toLocaleString('es-AR');

  function cargarCache(){
    try{ return JSON.parse(localStorage.getItem(CACHE_KEY)) || []; }
    catch(e){ return []; }
  }
  function guardarCache(data){
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
  }

  async function fetchRemoto(){
    const res = await fetch(KVDB_URL, { cache: 'no-store' });
    if(res.status === 404) return [];
    if(!res.ok) throw new Error('status ' + res.status);
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  async function guardarRemoto(data){
    const res = await fetch(KVDB_URL, { method: 'POST', body: JSON.stringify(data) });
    if(!res.ok) throw new Error('status ' + res.status);
  }

  function setEstado(texto, ok){
    const el = document.getElementById('estado');
    el.textContent = texto;
    el.style.color = ok ? 'var(--gris)' : 'var(--fuego-claro)';
  }

  async function refrescar(mostrarCarga){
    if(mostrarCarga) setEstado('Actualizando…', true);
    try{
      items = await fetchRemoto();
      guardarCache(items);
      setEstado('Sincronizado ✓', true);
    }catch(e){
      items = cargarCache();
      setEstado('Sin conexión — mostrando última copia guardada', false);
    }
    render();
  }

  async function persistir(){
    guardarCache(items);
    render();
    try{
      await guardarRemoto(items);
      setEstado('Sincronizado ✓', true);
    }catch(e){
      setEstado('No se pudo sincronizar — vas a reintentar al actualizar', false);
    }
  }

  function mensajeMotivo(pct, total){
    if(total <= 0) return 'Anotá tu primer ingreso del mes y arrancamos a sumar 💪';
    if(pct >= 100) return '¡Objetivo cumplido! 🎉 Superaste los $7.000.000. Grande el equipo.';
    if(pct >= 75) return `Estás en la recta final: ${pct.toFixed(0)}% del objetivo. ¡Sigue así!`;
    if(pct >= 50) return `Vas por la mitad del camino (${pct.toFixed(0)}%). ¡A no aflojar!`;
    if(pct >= 25) return `Buen arranque: ya llevás el ${pct.toFixed(0)}% del objetivo.`;
    return `Primeros pasos del mes: ${pct.toFixed(0)}% del objetivo. Cada ingreso suma.`;
  }

  function render(){
    const ordenados = items.slice().sort((a,b) => b.fecha.localeCompare(a.fecha));
    const total = items.reduce((s,i) => s + i.monto, 0);
    const pct = Math.min((total / META) * 100, 100);
    const pctReal = (total / META) * 100;

    document.getElementById('totalActual').textContent = fmt(total);
    document.getElementById('statFalta').textContent = fmt(Math.max(META - total, 0));
    document.getElementById('statCant').textContent = items.length;

    const barra = document.getElementById('barraInt');
    barra.style.width = pct + '%';
    barra.classList.toggle('completo', pctReal >= 100);
    document.getElementById('barraPct').textContent = pct > 8 ? pctReal.toFixed(0) + '%' : '';

    document.getElementById('motivo').textContent = mensajeMotivo(pctReal, total);
    document.getElementById('motivo').classList.toggle('completo', pctReal >= 100);

    const lista = document.getElementById('lista');
    if(ordenados.length === 0){
      lista.innerHTML = '<div class="vacio">Todavía no anotaste ningún ingreso.</div>';
      return;
    }
    lista.innerHTML = ordenados.map(i => `
      <div class="item">
        <div class="item-info">
          <div class="item-desc">${escapeHtml(i.desc)}</div>
          <div class="item-fecha">${formatoFecha(i.fecha)}</div>
        </div>
        <div class="item-monto">${fmt(i.monto)}</div>
        <button class="item-del" data-id="${i.id}" title="Eliminar">✕</button>
      </div>
    `).join('');

    lista.querySelectorAll('.item-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        items = items.filter(i => String(i.id) !== id);
        persistir();
      });
    });
  }

  function formatoFecha(f){
    const [y,m,d] = f.split('-');
    return `${d}/${m}/${y}`;
  }

  function escapeHtml(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  document.getElementById('form').addEventListener('submit', e => {
    e.preventDefault();
    const fecha = document.getElementById('fecha').value;
    const desc = document.getElementById('desc').value.trim();
    const monto = parseFloat(document.getElementById('monto').value);
    if(!fecha || !desc || !monto || monto <= 0) return;

    items.push({ id: Date.now(), fecha, desc, monto });
    persistir();

    document.getElementById('desc').value = '';
    document.getElementById('monto').value = '';
    document.getElementById('fecha').value = fecha;
  });

  document.getElementById('btnRefrescar').addEventListener('click', () => refrescar(true));

  document.getElementById('btnExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'objetivo-julio-2026-backup.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('btnImport').addEventListener('click', () => {
    document.getElementById('fileImport').click();
  });
  document.getElementById('fileImport').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        const data = JSON.parse(ev.target.result);
        if(Array.isArray(data)){
          items = data;
          persistir();
        }
      }catch(err){ alert('El archivo no es un backup válido.'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('btnReset').addEventListener('click', () => {
    if(confirm('¿Seguro que querés borrar todos los ingresos anotados este mes? Te conviene exportar un backup antes.')){
      items = [];
      persistir();
    }
  });

  // fecha de hoy por defecto
  document.getElementById('fecha').valueAsDate = new Date();

  refrescar(true);

  // repasa cambios hechos desde el otro dispositivo mientras la pestaña está abierta
  setInterval(() => {
    if(document.visibilityState === 'visible') refrescar(false);
  }, 20000);
</script>

</body>
</html>
